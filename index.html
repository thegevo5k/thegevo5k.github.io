<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We Play Simulators</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="logo.png">
</head>
<body>
  <header>
    <img src="logo.png" alt="We Play Simulators Logo" class="logo">
    <h1>We Play Simulators</h1>
    <p>Home of the ALC-42 for Train Simulator Classic</p>
  </header>

  <div id="catalog-view">
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="home">Home</button>
      <button class="tab-btn" data-tab="downloads">Downloads</button>
    </div>

    <div id="home-tab" class="tab-panel active">
      <div class="container">
        <div class="promo-banner">
          <h2 class="promo-title">Coming Soon</h2>
          <img src="images/Promo.jpg" alt="Coming Soon" class="promo-image" onerror="this.style.display='none'">
        </div>
      </div>
    </div>

    <div id="downloads-tab" class="tab-panel">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search downloads…" autocomplete="off">
      </div>

      <div class="container" id="main-content">
        <!-- Grid content loaded by JS -->
      </div>
    </div>
  </div>

  <!-- Item Detail Page (hidden by default) -->
  <div id="item-detail" class="item-detail-page" style="display: none;">
    <div class="container">
      <button onclick="goBackToHome()" class="btn-small" style="margin-bottom: 20px;">← Back to Catalog</button>
      <div id="detail-content"></div>
    </div>
  </div>

  <footer>
    <div class="footer-grid">
      <div class="footer-col">
        <h4>We Play Simulators</h4>
        <p>Home of the ALC-42 and more for Train Simulator Classic.</p>
      </div>
      <div class="footer-col">
        <h4>Browse</h4>
        <a href="#locomotives">Locomotives</a>
        <a href="#quickdrives">Quick Drives</a>
        <a href="#dependencies">Dependencies</a>
      </div>
    </div>
    <p>&copy; 2026 We Play Simulators</p>
    <p style="text-align:center; font-size:0.9rem; color:#777; margin: 10px 0;" id="last-updated"></p>
  </footer>

  <script src="script.js"></script>

  <!-- Image lightbox -->
  <div id="lightbox" class="lightbox-overlay" onclick="closeLightbox()">
    <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
    <button class="arrow-btn left lightbox-arrow" onclick="event.stopPropagation(); prevImage()">←</button>
    <img id="lightbox-img" class="lightbox-img" onclick="event.stopPropagation()">
    <button class="arrow-btn right lightbox-arrow" onclick="event.stopPropagation(); nextImage()">→</button>
  </div>
</body>
</html>
