<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We Play Simulators</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="logo.png">
</head>
<body>
  <header>
    <img src="logo.png" alt="We Play Simulators Logo" class="logo">
    <h1>We Play Simulators</h1>
    <p>Home of the ALC-42 for Train Simulator Classic</p>
  </header>

  <nav>
    <a href="#routes">Routes</a>
    <a href="#locomotives">Locomotives</a>
    <a href="#rollingstock">Rolling Stock</a>
  </nav>

  <div class="container">

    <section id="routes">
      <h2>Routes</h2>
      <div id="routes-grid" class="download-grid"></div>
    </section>

    <section id="locomotives">
      <h2>Locomotives</h2>
      <div id="locomotives-grid" class="download-grid"></div>
    </section>

    <section id="rollingstock">
      <h2>Rolling Stock</h2>
      <div id="rollingstock-grid" class="download-grid"></div>
    </section>

  </div>

  <!-- Modal -->
  <div id="itemModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <div id="modal-content"></div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 We Play Simulators</p>
    <p style="text-align:center; font-size:0.9rem; color:#777; margin: 10px 0;" id="last-updated"></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
