<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We Play Simulators</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="logo.png">
</head>
<body>
  <header>
    <img src="logo.png" alt="We Play Simulators Logo" class="logo">
    <h1>We Play Simulators</h1>
    <p>We're a talented group of developers for Train Simulator Classic. We intend to provide the best quality content possible at the lowest possible price. FREE.</p>
  </header>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search downloads…" autocomplete="off">
  </div>

  <div class="container" id="main-content">
    <!-- Grid content loaded by JS -->
  </div>

  <!-- Item Detail Page (hidden by default) -->
  <div id="item-detail" class="item-detail-page" style="display: none;">
    <div class="container">
      <button onclick="goBackToHome()" class="btn-small" style="margin-bottom: 20px;">← Back to Catalog</button>
      <div id="detail-content"></div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 We Play Simulators</p>
    <p style="text-align:center; font-size:0.9rem; color:#777; margin: 10px 0;" id="last-updated"></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
