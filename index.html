<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK8D Time Trials Fundraiser</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #e60012; 
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --success: #00ff66;
            --warning: #ffcc00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 15px; padding-bottom: 60px; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; color: var(--accent-color); margin-bottom: 5px; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .sub-header { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; }

        .donation-banner { background: linear-gradient(135deg, #e60012, #99000b); padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px; }
        .donation-total { font-size: 3rem; font-weight: 800; margin-top: 5px; }

        .card { background-color: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #2a2a2a; }
        .card h3 { margin-bottom: 15px; font-size: 1.2rem; border-bottom: 2px solid #2a2a2a; padding-bottom: 5px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.9rem; }
        input[type="text"], select { width: 100%; padding: 12px; background-color: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 6px; color: white; font-size: 1rem; }
        input:focus, select:focus { border-color: var(--accent-color); outline: none; }

        .search-box { margin-bottom: 15px; background-color: #1a1a1a; border-color: #2a2a2a; }

        .time-row { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; align-items: center; margin-bottom: 10px; }
        .time-inputs { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 5px; }
        
        .time-inputs input { 
            text-align: center; 
            padding: 10px 5px; 
            background-color: #2a2a2a; 
            border: 1px solid #3a3a3a; 
            border-radius: 6px; 
            color: white; 
            font-size: 1rem; 
            -webkit-appearance: none;
            margin: 0;
        }

        button { width: 100%; padding: 14px; background-color: var(--accent-color); border: none; border-radius: 6px; color: white; font-size: 1rem; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background-color: #3a3a3a; }
        
        /* Inline Delete Styling & Animation */
        .btn-danger { background-color: #99000b; }
        .btn-danger.confirm-state {
            background-color: #ff0000;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 0.8; }
            to { opacity: 1; }
        }

        .leaderboard-item { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #2a2a2a; }
        .lb-main { display: flex; justify-content: space-between; align-items: center; }
        .player-info { display: flex; align-items: center; gap: 10px; }
        .player-time { font-family: monospace; font-size: 1.2rem; color: var(--success); font-weight: bold; }
        
        .log-meta-row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; font-size: 0.8rem; }
        .all-times { color: var(--text-muted); }
        .retries-left { color: var(--bg-color); background-color: var(--warning); padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; }

        .inline-actions { display: flex; gap: 5px; margin-top: 5px; border-top: 1px solid #2a2a2a; padding-top: 8px; }
        .inline-actions button { padding: 6px; font-size: 0.75rem; width: auto; flex: 1; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>MK8D Championship</h1>
    <div class="sub-header">Fundraiser for Children's Miracle Network</div>

    <div class="donation-banner">
        <h2>Total Raised</h2>
        <div class="donation-total" id="donation-total">$0</div>
    </div>

    <!-- MAIN REGISTRATION FORM -->
    <div class="card">
        <h3>New Run / Buy-In Registration</h3>
        <form id="entryForm">
            <div class="form-group">
                <label for="entryType">Entry Type</label>
                <select id="entryType" onchange="handleTypeChange()">
                    <option value="Initial">Initial Buy-In ($3 - 3 Attempts)</option>
                    <option value="Retry">Retry ($2 - 3 Attempts)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="playerName">Player Name</label>
                <input type="text" id="playerName" placeholder="Driver's Name" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Enter Times (Leave blank if running later)</label>
                
                <div class="time-row">
                    <span>Run 1:</span>
                    <div class="time-inputs">
                        <input type="text" id="t1m" inputmode="numeric" pattern="[0-9]*" placeholder="MM">
                        <input type="text" id="t1s" inputmode="numeric" pattern="[0-9]*" placeholder="SS">
                        <input type="text" id="t1ms" inputmode="numeric" pattern="[0-9]*" placeholder="mmm">
                    </div>
                </div>
                <div class="time-row">
                    <span>Run 2:</span>
                    <div class="time-inputs">
                        <input type="text" id="t2m" inputmode="numeric" pattern="[0-9]*" placeholder="MM">
                        <input type="text" id="t2s" inputmode="numeric" pattern="[0-9]*" placeholder="SS">
                        <input type="text" id="t2ms" inputmode="numeric" pattern="[0-9]*" placeholder="mmm">
                    </div>
                </div>
                <div class="time-row">
                    <span>Run 3:</span>
                    <div class="time-inputs">
                        <input type="text" id="t3m" inputmode="numeric" pattern="[0-9]*" placeholder="MM">
                        <input type="text" id="t3s" inputmode="numeric" pattern="[0-9]*" placeholder="SS">
                        <input type="text" id="t3ms" inputmode="numeric" pattern="[0-9]*" placeholder="mmm">
                    </div>
                </div>
            </div>
            <button type="submit" id="submitBtn">Submit Buy-In ($3)</button>
        </form>
    </div>

    <!-- LIVE LEADERBOARD -->
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3>Live Leaderboard & Log</h3>
            <button class="btn-secondary" onclick="fetchData()" style="width: auto; padding: 6px 12px; margin: 0; font-size: 0.8rem;">🔄 Refresh</button>
        </div>
        
        <!-- Search Filter Box -->
        <input type="text" id="searchDriver" class="search-box" placeholder="🔍 Search driver name..." onkeyup="filterLeaderboard()">
        
        <div id="leaderboard-container"></div>
    </div>
</div>

<!-- COMPACT EDIT MODAL -->
<div id="editModal" class="card hidden" style="position: fixed; top: 5%; left: 50%; transform: translateX(-50%); width: 92%; max-width: 440px; z-index: 100; box-shadow: 0 0 30px rgba(0,0,0,0.9); border-color: var(--accent-color); max-height: 90vh; overflow-y: auto;">
    <h3>Quick Edit Entry</h3>
    <input type="hidden" id="editRowId">
    
    <div class="form-group" style="margin-top: 10px;">
        <label for="editName">Driver Name</label>
        <input type="text" id="editName" autocomplete="off">
    </div>
    
    <div class="form-group">
        <label>Modify Lap Times</label>
        
        <div class="time-row">
            <span>Run 1:</span>
            <div class="time-inputs">
                <input type="text" id="e1m" inputmode="numeric" pattern="[0-9]*" placeholder="MM">
                <input type="text" id="e1s" inputmode="numeric" pattern="[0-9]*" placeholder="SS">
                <input type="text" id="e1ms" inputmode="numeric" pattern="[0-9]*" placeholder="mmm">
            </div>
        </div>
        
        <div class="time-row">
            <span>Run 2:</span>
            <div class="time-inputs">
                <input type="text" id="e2m" inputmode="numeric" pattern="[0-9]*" placeholder="MM">
                <input type="text" id="e2s" inputmode="numeric" pattern="[0-9]*" placeholder="SS">
                <input type="text" id="e2ms" inputmode="numeric" pattern="[0-9]*" placeholder="mmm">
            </div>
        </div>
        
        <div class="time-row">
            <span>Run 3:</span>
            <div class="time-inputs">
                <input type="text" id="e3m" inputmode="numeric" pattern="[0-9]*" placeholder="MM">
                <input type="text" id="e3s" inputmode="numeric" pattern="[0-9]*" placeholder="SS">
                <input type="text" id="e3ms" inputmode="numeric" pattern="[0-9]*" placeholder="mmm">
            </div>
        </div>
    </div>
    
    <button onclick="saveEdit()" style="margin-top: 10px;">Save Changes</button>
    <button class="btn-secondary" onclick="closeEditModal()" style="margin-top: 8px;">Cancel</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhgfGvVaVHY2B4kAH1I6gMMR92eadEaUQ_04wLJpnNRVM8uD-JPazcdxLkHesN0Xwoyw/exec"; 
    
    // Tracks active timeouts for inline delete buttons
    let deleteTimeouts = {};

    function setupInputFilters(mId, sId, msId) {
        const mInput = document.getElementById(mId);
        const sInput = document.getElementById(sId);
        const msInput = document.getElementById(msId);

        [mInput, sInput, msInput].forEach(input => {
            input.addEventListener('input', function() {
                this.value = this.value.replace(/[^0-9]/g, '');
            });
        });

        mInput.addEventListener('input', function() { if(this.value.length > 1) this.value = this.value.slice(0,1); });
        msInput.addEventListener('input', function() { if(this.value.length > 3) this.value = this.value.slice(0,3); });
        
        sInput.addEventListener('input', function() {
            if(this.value.length > 2) this.value = this.value.slice(0,2);
        });
        
        sInput.addEventListener('blur', function() {
            if (parseInt(this.value) > 59) {
                this.value = "59";
            }
        });
    }

    setupInputFilters('t1m', 't1s', 't1ms');
    setupInputFilters('t2m', 't2s', 't2ms');
    setupInputFilters('t3m', 't3s', 't3ms');
    setupInputFilters('e1m', 'e1s', 'e1ms');
    setupInputFilters('e2m', 'e2s', 'e2ms');
    setupInputFilters('e3m', 'e3s', 'e3ms');

    function handleTypeChange() {
        const type = document.getElementById('entryType').value;
        document.getElementById('submitBtn').innerText = type === 'Initial' ? 'Submit Buy-In ($3)' : 'Submit Retry ($2)';
    }

    function parseTimeToMs(m, s, ms) {
        if (!m && !s && !ms) return null;
        let secVal = parseInt(s) || 0;
        if (secVal > 59) secVal = 59; 
        return { displayStr: `${parseInt(m)||0}:${secVal.toString().padStart(2, '0')}.${(parseInt(ms)||0).toString().padStart(3, '0')}` };
    }

    function deconstructTimeString(str, mId, sId, msId) {
        if (!str || !str.includes(':') || str === "undefined") {
            document.getElementById(mId).value = "";
            document.getElementById(sId).value = "";
            document.getElementById(msId).value = "";
            return;
        }
        const parts = str.split(/[:.]/);
        document.getElementById(mId).value = parts[0] || "";
        document.getElementById(sId).value = parts[1] || "";
        document.getElementById(msId).value = parts[2] || "";
    }

    document.getElementById('entryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "Saving...";

        let t1 = parseTimeToMs(document.getElementById('t1m').value, document.getElementById('t1s').value, document.getElementById('t1ms').value);
        let t2 = parseTimeToMs(document.getElementById('t2m').value, document.getElementById('t2s').value, document.getElementById('t2ms').value);
        let t3 = parseTimeToMs(document.getElementById('t3m').value, document.getElementById('t3s').value, document.getElementById('t3ms').value);

        fetch(API_URL, {
            method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                action: "add",
                name: document.getElementById('playerName').value.trim(),
                type: document.getElementById('entryType').value,
                amount: document.getElementById('entryType').value === 'Initial' ? 3 : 2,
                time1: t1 ? t1.displayStr : "", time2: t2 ? t2.displayStr : "", time3: t3 ? t3.displayStr : ""
            })
        }).then(() => {
            document.getElementById('entryForm').reset();
            handleTypeChange();
            btn.disabled = false;
            fetchData();
        }).catch(() => { alert("Error saving."); btn.disabled = false; });
    });

    function fetchData() {
        fetch(API_URL).then(res => res.json()).then(data => {
            let total = 0, itemArray = [];
            
            data.forEach(entry => {
                total += parseFloat(entry.amount || 0);
                let bestMs = Infinity, bestDisplay = "—";
                let runCount = 0;

                [entry.time1, entry.time2, entry.time3].forEach(str => {
                    if (str && str.includes(':')) {
                        runCount++;
                        let parts = str.split(/[:.]/);
                        let ms = (parseInt(parts[0])*60*1000) + (parseInt(parts[1])*1000) + parseInt(parts[2]);
                        if (ms < bestMs) { bestMs = ms; bestDisplay = str; }
                    }
                });

                let attemptsLeft = 3 - runCount;
                itemArray.push({ ...entry, bestMs: bestMs, bestDisplay: bestDisplay, attemptsLeft: attemptsLeft });
            });

            document.getElementById('donation-total').innerText = `$${total}`;
            itemArray.sort((a, b) => a.bestMs - b.bestMs);

            const container = document.getElementById('leaderboard-container');
            container.innerHTML = itemArray.length ? "" : "<p style='color:var(--text-muted);text-align:center;'>No registrations yet.</p>";
            
            itemArray.forEach((p, idx) => {
                let rank = idx + 1;
                let emoji = "";
                if (p.bestMs !== Infinity) {
                    if (rank === 1) emoji = "👑 ";
                    else if (rank === 2) emoji = "🥈 ";
                    else if (rank === 3) emoji = "🥉 ";
                } else {
                    rank = "—";
                }

                let attemptsBadge = p.attemptsLeft > 0 
                    ? `<span class="retries-left">${p.attemptsLeft} left</span>` 
                    : ``;

                container.innerHTML += `
                    <div class="leaderboard-item" data-name="${p.name.toLowerCase()}">
                        <div class="lb-main">
                            <div class="player-info">
                                <span style="width:20px; color:var(--text-muted); font-weight:bold;">${rank}</span>
                                <span style="font-weight:500;" class="driver-display-name">${emoji}${p.name} <small style="color:var(--text-muted); font-size:0.75rem;">(${p.type})</small></span>
                            </div>
                            <div class="player-time">${p.bestDisplay}</div>
                        </div>
                        <div class="log-meta-row">
                            <div class="all-times">Runs Logged: [${p.time1 || '—'}] [${p.time2 || '—'}] [${p.time3 || '—'}]</div>
                            ${attemptsBadge}
                        </div>
                        <div class="inline-actions">
                            <button class="btn-secondary" onclick="openEditModal(${p.rowId}, '${p.name.replace(/'/g, "\\'")}', '${p.time1}', '${p.time2}', '${p.time3}')">✏️ Edit</button>
                            <button class="btn-danger" onclick="deleteEntry(this, ${p.rowId}, '${p.name.replace(/'/g, "\\'")}')">🗑️ Delete</button>
                        </div>
                    </div>`;
            });

            // Prevent refresh cycles from overriding active search filtering
            filterLeaderboard();
        });
    }

    function filterLeaderboard() {
        const query = document.getElementById('searchDriver').value.toLowerCase().trim();
        const items = document.getElementsByClassName('leaderboard-item');
        
        for (let i = 0; i < items.length; i++) {
            let driverName = items[i].getAttribute('data-name');
            if (driverName.includes(query)) {
                items[i].classList.remove('hidden');
            } else {
                items[i].classList.add('hidden');
            }
        }
    }

    function openEditModal(rowId, name, t1, t2, t3) {
        document.getElementById('editRowId').value = rowId;
        document.getElementById('editName').value = name;
        
        deconstructTimeString(t1, 'e1m', 'e1s', 'e1ms');
        deconstructTimeString(t2, 'e2m', 'e2s', 'e2ms');
        deconstructTimeString(t3, 'e3m', 'e3s', 'e3ms');
        
        document.getElementById('editModal').classList.remove('hidden');
    }

    function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }

    function saveEdit() {
        let t1 = parseTimeToMs(document.getElementById('e1m').value, document.getElementById('e1s').value, document.getElementById('e1ms').value);
        let t2 = parseTimeToMs(document.getElementById('e2m').value, document.getElementById('e2s').value, document.getElementById('e2ms').value);
        let t3 = parseTimeToMs(document.getElementById('e3m').value, document.getElementById('e3s').value, document.getElementById('e3ms').value);

        fetch(API_URL, {
            method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                action: "edit", 
                rowId: document.getElementById('editRowId').value,
                name: document.getElementById('editName').value.trim(),
                time1: t1 ? t1.displayStr : "", 
                time2: t2 ? t2.displayStr : "", 
                time3: t3 ? t3.displayStr : ""
            })
        }).then(() => { closeEditModal(); fetchData(); });
    }

    function deleteEntry(btn, rowId, name) {
        // First click transforms the button to a dangerous-looking confirmation state
        if (!btn.classList.contains('confirm-state')) {
            btn.classList.add('confirm-state');
            btn.innerText = "⚠️ Confirm?";
            
            if(deleteTimeouts[rowId]) clearTimeout(deleteTimeouts[rowId]);
            
            // Automatically reset back to a safe look if left unclicked for 4 seconds
            deleteTimeouts[rowId] = setTimeout(() => {
                btn.classList.remove('confirm-state');
                btn.innerText = "🗑️ Delete";
            }, 4000);
            
            return; 
        }

        // Second click executes actual delete script request
        btn.disabled = true;
        btn.innerText = "Erasing...";
        
        if(deleteTimeouts[rowId]) clearTimeout(deleteTimeouts[rowId]);

        fetch(API_URL, {
            method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "delete", rowId: rowId })
        }).then(() => { 
            fetchData(); 
        }).catch(() => {
            alert("Delete failed.");
            fetchData();
        });
    }

    fetchData();
    setInterval(fetchData, 20000);
</script>
</body>
</html>
